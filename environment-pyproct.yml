name: pyproct
channels:
  - conda-forge
dependencies:
  # pyProCT-only environment, based on the validated local Python 3 setup.
  - python=3.10.20
  - pytest=7.4.4
  - setuptools=82.0.1
  - pip=26.0.1
  - wheel=0.47.0
  - pip:
      - numpy==2.2.6
      - scipy==1.15.3
      - pandas==2.3.3
      - biopython==1.87
      - cython==3.2.4
      - fastcluster==1.3.0
      - prody==2.6.1
      - scikit-learn==1.7.2
      - pillow==12.2.0
      - matplotlib==3.10.9
      - mpi4py==4.1.1
      - seaborn==0.13.2
      - networkx==3.4.2

variables:
  PYTHONUSERBASE: intentionally-disabled
  PYTHONNOUSERSITE: "1"
